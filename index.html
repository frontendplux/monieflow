<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body, #app {
            margin: 0; background:whitesmoke;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        .menu-item-btn {
                    border-radius: 20px;
                    background: rgba(255,255,255,0.4);
                    font-weight: 700;
                    transition: 0.3s;
                    }

        .menu-item-btn:hover {
                    transform: scale(1.05);
                    color: white;
                    background: wheat;
                    }

        .postfiled-imaging{
         display: flex; flex-wrap: wrap;
        }
        .postfiled-imaging img{
            width: 50%; padding: 2px; height: 200px; object-fit: cover;
            object-fit: cover; object-position: center;
        }
        .postfiled-imaging img:nth-child(1),
        .postfiled-imaging img:nth-child(4),
        .postfiled-imaging img:nth-child(7),
        .postfiled-imaging img:nth-child(10),
        .postfiled-imaging img:nth-child(13),
        .postfiled-imaging img:nth-child(16)
        {
            width: 100%;
        }

        .pageing999 {
  transform: translateX(0);
  opacity: 1;
  transition: all 0.3s ease;
}

.page.fade-outing999 {
  transform: translateX(-20px);
  opacity: 0;
}

.page.fade-ining999 {
  transform: translateX(0);
  opacity: 1;
}


.l-pro-line img{
   width: 50%;
}
    </style>
    <script type="module" src="/module.js"></script>
    <title></title>
</head>
<body>
    <div id="app"></div>
</body>
</html>
