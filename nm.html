<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alister Bank</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* ===== RESET ===== */
body {
  font-family: "Segoe UI", Arial, sans-serif;
}

/* ===== TOP SOCIAL BAR ===== */
.social-bar {
  background: #efefef;
  border-bottom: 1px solid #ddd;
}
.social-bar a {
  color: #999;
  font-size: 14px;
  margin-left: 12px;
}
.social-bar a:hover {
  color: #d9534f;
}

/* ===== LOGO BAR ===== */
.logo-bar {
  background: #fff;
  padding: 18px 0;
}
.logo-text {
  font-size: 22px;
  font-weight: 600;
}
.logo-icon {
  width: 42px;
  height: 42px;
  margin-right: 10px;
}

/* ===== UTILITY LINKS ===== */
.utility-links a {
  color: #333;
  font-size: 14px;
  margin-left: 22px;
  text-decoration: none;
}
.utility-links i {
  margin-right: 6px;
}
.utility-links a:hover {
  color: #d9534f;
}

/* ===== MAIN NAV ===== */
.main-nav {
  border-top: 1px solid #ddd;
}
.main-nav .nav-link {
  color: #000;
  font-weight: 500;
  padding: 16px 18px;
}
.main-nav .nav-link.active {
  border-bottom: 3px solid #d9534f;
  color: #d9534f;
}
.main-nav .nav-link:hover {
  color: #d9534f;
}
</style>
</head>

<body>

<!-- 🔹 TOP SOCIAL BAR -->
<div class="social-bar py-2">
  <div class="container d-flex justify-content-end">
    <a href="#"><i class="bi bi-twitter"></i></a>
    <a href="#"><i class="bi bi-facebook"></i></a>
    <a href="#"><i class="bi bi-youtube"></i></a>
    <a href="#"><i class="bi bi-instagram"></i></a>
    <a href="#"><i class="bi bi-google"></i></a>
  </div>
</div>

<!-- 🔹 LOGO + UTILITIES -->
<div class="logo-bar">
  <div class="container d-flex justify-content-between align-items-center">

    <!-- Logo -->
    <div class="d-flex align-items-center">
      <img src="logo.png" class="logo-icon" alt="Logo">
      <span class="logo-text">Alister Bank</span>
    </div>

    <!-- Utilities -->
    <div class="utility-links d-flex align-items-center">
      <a href="#"><i class="bi bi-chat-left-text"></i> Contact Us</a>
      <a href="#"><i class="bi bi-geo-alt"></i> Locations</a>
      <a href="#"><i class="bi bi-person"></i> Sign In</a>
      <a href="#"><i class="bi bi-search"></i></a>
    </div>

  </div>
</div>

<!-- 🔹 MAIN MENU -->
<nav class="navbar navbar-expand-lg navbar-light bg-white main-nav">
  <div class="container">

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainMenu">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Credit Cards</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Features</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Shortcodes</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Post Types</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">News</a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
