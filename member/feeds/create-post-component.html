// 2. Simple Emoji Trigger
// Note: For a full Sticker UI, you can use "Emoji Mart" or "FG Emoji Picker"
document.getElementById('emojiTrigger').addEventListener('click', () => {
    const input = document.getElementById('commentInput');
    // For native mobile/OS emoji picker, we can focus and suggest
    // Or toggle a hidden div with common emojis:
    const emojis = ['❤️', '😂', '🙌', '🔥', '👏', '😢', '😍', '😮'];
    
    // Quick simple toggle (You can expand this into a proper popover)
    let emojiBar = document.getElementById('quickEmojiBar');
    if (!emojiBar) {
        emojiBar = document.createElement('div');
        emojiBar.id = 'quickEmojiBar';
        emojiBar.className = 'd-flex gap-2 p-2 border-bottom animate__animated animate__fadeIn';
        emojis.forEach(e => {
            const span = document.createElement('span');
            span.innerHTML = e;
            span.style.cursor = 'pointer';
            span.onclick = () => { input.value += e; input.focus(); };
            emojiBar.appendChild(span);
        });
        input.parentElement.parentElement.prepend(emojiBar);
    } else {
        emojiBar.remove();
    }
});


// 1. Define the loading function FIRST
async function loadComments(feedId) {
    const listContainer = document.getElementById('commentList');
    
    // Show a small loader while fetching
    listContainer.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

    try {
        const response = await fetch('/member/feeds/post.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'load-comments', feed_id: feedId })
        });
        
        const data = await response.json();

        if (data.status === 'success') {
            // Update the HTML with nested comments
            listContainer.innerHTML = data.html || '<p class="text-center text-muted py-5">No comments yet. Be the first!</p>';
            // Update the badge count in the header
            document.getElementById('totalCommentCount').innerText = data.total;
        }
    } catch (error) {
        console.error("Error loading comments:", error);
        listContainer.innerHTML = '<p class="text-center text-danger py-5">Failed to load comments.</p>';
    }
}

// 2. Define the Modal Open function
function openComments(feedId, currentCount = 0) {
    // Set the hidden input so we know which post we are commenting on
    document.getElementById('activeFeedId').value = feedId;
    
    // Set the initial count from the feed UI
    document.getElementById('totalCommentCount').innerText = currentCount;

    // Trigger the Bootstrap Modal
    const commentModalElement = document.getElementById('commentModal');
    const modal = bootstrap.Modal.getOrCreateInstance(commentModalElement);
    modal.show();

    // Call the loading function defined above
    loadComments(feedId);
}


async function likeComment(commentId, element) {
    try {
        const response = await fetch('/member/feeds/post.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'like-comment', comment_id: commentId })
        });
        const res = await response.json();

        if (res.status === 'success') {
            const countSpan = element.querySelector('.l-cnt');
            countSpan.innerText = res.count;
            
            if (res.type === 'liked') {
                element.classList.replace('text-muted', 'text-primary');
                element.classList.add('fw-bold');
            } else {
                element.classList.replace('text-primary', 'text-muted');
                element.classList.remove('fw-bold');
            }
        }
    } catch (e) { console.error("Like error", e); }
}
// 3. Define the Reply helper
function prepareReply(commentId, username) {
    document.getElementById('activeParentId').value = commentId;
    document.getElementById('replyUser').innerText = username;
    document.getElementById('replyingTo').classList.remove('d-none');
    document.getElementById('commentInput').focus();
}

// 4. Define the Cancel Reply helper
function cancelReply() {
    document.getElementById('activeParentId').value = 0;
    document.getElementById('replyingTo').classList.add('d-none');
}

// 3. Update counter after successful post
async function submitComment() {
    const feedId = document.getElementById('activeFeedId').value;
    const parentId = document.getElementById('activeParentId').value;
    const content = document.getElementById('commentInput').value;

    if (!content.trim()) return;

    const res = await fetch('/member/feeds/post.php', {
        method: 'POST',
        body: JSON.stringify({ 
            action: 'add-comment', 
            feed_id: feedId, 
            reply_id: parentId, 
            content: content 
        })
    });
    
    const data = await res.json();
    if (data.status === 'success') {
        document.getElementById('commentInput').value = "";
        // Increment the header counter locally for speed
        const counter = document.getElementById('totalCommentCount');
        counter.innerText = parseInt(counter.innerText) + 1;
        
        cancelReply();
        loadComments(feedId);
    }
}
</script>

<script>
    function popMedia(path, type) {
    const popContent = document.getElementById('popContent');
    const modal = new bootstrap.Modal(document.getElementById('mediaPopModal'));
    
    if (type === 'image') {
        popContent.innerHTML = `<img src="/uploads/feeds/${path}" class="img-fluid rounded shadow-lg" style="max-height: 90vh;">`;
    } else if (type === 'video') {
        popContent.innerHTML = `
            <video controls autoplay class="w-100 rounded shadow-lg" style="max-height: 90vh;">
                <source src="/${path}" type="video/mp4">
            </video>`;
    }
    
    modal.show();
    
    // Stop video when modal closes
    document.getElementById('mediaPopModal').addEventListener('hidden.bs.modal', function () {
        popContent.innerHTML = '';
    });
}
</script>


<script>
    let uploadedMedia = []; // Stores base64 strings and types

    // 1. Reset Modal on Call
    const myModalEl = document.getElementById('feedPostModal');
    myModalEl.addEventListener('show.bs.modal', function () {
        document.getElementById('postText').value = "";
        document.getElementById('previewArea').innerHTML = "";
        document.getElementById('emojiPickerWrapper').classList.add('d-none');
        uploadedMedia = [];
    });

    // 2. Toggle Emoji Picker
    function toggleEmojiPicker(event) {
        event.stopPropagation();
        const wrapper = document.getElementById('emojiPickerWrapper');
        wrapper.classList.toggle('d-none');
    }

    // 3. Emoji Selection Logic
    document.addEventListener('DOMContentLoaded', () => {
        const picker = document.querySelector('emoji-picker');
        const textArea = document.getElementById('postText');
        const wrapper = document.getElementById('emojiPickerWrapper');

        picker.addEventListener('emoji-click', event => {
            const emoji = event.detail.unicode;
            const start = textArea.selectionStart;
            const end = textArea.selectionEnd;
            textArea.value = textArea.value.substring(0, start) + emoji + textArea.value.substring(end);
            textArea.selectionStart = textArea.selectionEnd = start + emoji.length;
            textArea.focus();
        });

        document.addEventListener('click', (e) => {
            if (!wrapper.contains(e.target) && !e.target.closest('button')) {
                wrapper.classList.add('d-none');
            }
        });
    });

    // 4. Handle Multiple Images & Previews
    function previewFiles() {
        const preview = document.getElementById('previewArea');
        const files = document.getElementById('postImages').files;

        for (const file of files) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64String = e.target.result;
                const mediaId = Date.now() + Math.random();
                
                // Add to data array
                uploadedMedia.push({ id: mediaId, file_type: file.type, file: base64String });

                // Create UI
                const container = document.createElement("div");
                container.className = "preview-container";
                container.id = `media-${mediaId}`;
                container.innerHTML = `
                    <img src="${base64String}" class="preview-img">
                    <button class="remove-btn" onclick="removeMedia(${mediaId})"><i class="ri-close-line"></i></button>
                `;
                preview.appendChild(container);
            }
            reader.readAsDataURL(file);
        }
    }

    function removeMedia(id) {
        uploadedMedia = uploadedMedia.filter(item => item.id !== id);
        document.getElementById(`media-${id}`).remove();
    }

    // 5. Submit as Webhook JSON
    async function submitPost() {
        const text = document.getElementById('postText').value;
        const submitBtn = document.getElementById('submitBtn');

        if(text.trim() === "" && uploadedMedia.length === 0) {
            return alert("Post cannot be empty!");
        }

        const payload = {
            action: "create-feeds",
            content: text,
            media: uploadedMedia.map(m => ({ file_type: m.file_type, file: m.file }))
        };

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Posting...";

        try {
            const response = await fetch('/member/feeds/post.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res => res.json());
             
            if (response.status) {
                window.location.reload();
                // bootstrap.Modal.getInstance(myModalEl).hide();
            } else {
                alert("Server error. Check console.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Webhook sent (Check Network Tab if running on localhost)");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = "Post";
        }
    }
</script>
